<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>단어 팡팡 게임 - 젤리 에디션</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Jua', sans-serif; letter-spacing: 1px; }
    
    #cameraBackground { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transform: scaleX(-1); }

    .hand-pointer {
      position: absolute; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.6); 
      border: 4px solid #FFD700; border-radius: 50%; transform: translate(-50%, -50%); 
      z-index: 50; box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), inset 0 0 10px #FFF; pointer-events: none; display: none; backdrop-filter: blur(2px);
    }
    .hand-pointer::after { content: '⭐'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

    .jelly-box {
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border: 4px solid #FFF;
      border-radius: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 -4px 10px rgba(0,0,0,0.05); color: #555;
    }

    #uiContainer1P { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; display: none; }
    #targetMeaning1P { padding: 20px 50px; font-size: 50px; color: #FF7043; text-shadow: 2px 2px 0px #FFF; display: inline-block; }
    #scoreBoard1P { position: absolute; right: 30px; top: 30px; background: rgba(255, 235, 59, 0.9); padding: 15px 35px; border-radius: 30px; font-size: 40px; color: #E65100; display: none; border: 4px solid #FFF; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

    /* === 🚀 2인 모드 중앙 경계선 및 VS 마크 === */
    #divider2P { 
      display: none; position: absolute; left: 50%; top: 0; bottom: 0; width: 14px; 
      background: repeating-linear-gradient(to bottom, #FFEB3B 0, #FFEB3B 30px, transparent 30px, transparent 60px);
      z-index: 5; transform: translateX(-50%); border-radius: 10px;
      filter: drop-shadow(0 0 10px rgba(255, 235, 59, 0.8));
    }
    #vsBadge {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #FF4081; color: white; font-size: 50px; padding: 15px 20px; 
      border-radius: 50%; border: 6px solid #FFF; box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
      text-shadow: 2px 2px 0px #C2185B;
    }
    /* ======================================= */
    
    #uiP1 { display: none; position: absolute; left: 30px; top: 30px; background: rgba(129, 212, 250, 0.9); color: #0277BD; padding: 15px 25px; border-radius: 35px; align-items: center; gap: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 10; border: 4px solid #FFF; }
    #uiP1 .score { font-size: 32px; }
    #uiP1 .target { font-size: 40px; background: #FFF; color: #0288D1; padding: 10px 30px; border-radius: 25px; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1); }
    
    #uiP2 { display: none; position: absolute; right: 30px; top: 30px; background: rgba(255, 204, 128, 0.9); color: #E65100; padding: 15px 25px; border-radius: 35px; align-items: center; gap: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 10; flex-direction: row-reverse; border: 4px solid #FFF; }
    #uiP2 .score { font-size: 32px; }
    #uiP2 .target { font-size: 40px; background: #FFF; color: #E65100; padding: 10px 30px; border-radius: 25px; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1); }

    #timerBoard { position: absolute; left: 50%; transform: translateX(-50%); top: 30px; background: rgba(244, 143, 177, 0.9); padding: 15px 40px; border-radius: 35px; font-size: 42px; color: #FFF; box-shadow: 0 8px 15px rgba(0,0,0,0.2); z-index: 15; border: 4px solid #FFF; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); display: none; }

    .falling-word { 
      position: absolute; color: #333; padding: 20px 45px; border-radius: 50px; font-size: 45px; cursor: pointer; user-select: none; 
      box-shadow: 0 10px 15px rgba(0,0,0,0.15), inset 0 5px 10px rgba(255,255,255,0.8); white-space: nowrap; transition: transform 0.1s; border: 4px solid #FFF; z-index: 20; /* 경계선 위로 떨어지게 수정 */
    }
    .word-1p { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); color: #0D47A1; }
    .word-p1 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #004D40; }
    .word-p2 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #BF360C; }

    @keyframes popOut { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4) rotate(10deg); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
    .correct-anim { animation: popOut 0.4s ease-out forwards; background: #C8E6C9 !important; border-color: #4CAF50 !important; color: #2E7D32 !important; pointer-events: none; }
    
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-20px) rotate(-10deg); } 50% { transform: translateX(20px) rotate(10deg); } }
    .wrong-anim { animation: shake 0.4s ease-in-out forwards; background: #FFCDD2 !important; border-color: #F44336 !important; color: #C62828 !important; pointer-events: none; }

    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #555; text-align: center; }
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; margin-top: 20px; }
    .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    
    .btn { 
      padding: 15px 40px; font-size: 35px; background: #FF8A65; color: white; border: 4px solid #FFF; border-radius: 35px; 
      cursor: pointer; box-shadow: 0 8px 0 #D84315, 0 15px 20px rgba(0,0,0,0.2); margin: 15px; transition: 0.1s; font-family: 'Jua', sans-serif;
    }
    .btn:active { transform: translateY(8px); box-shadow: 0 0 0 #D84315, 0 5px 10px rgba(0,0,0,0.2); }
    #startBtn { background: #4DB6AC; box-shadow: 0 8px 0 #00695C, 0 15px 20px rgba(0,0,0,0.2); display: none; font-size: 45px; padding: 20px 60px; margin-top: 30px; }
    #startBtn:active { transform: translateY(8px); box-shadow: 0 0 0 #00695C, 0 5px 10px rgba(0,0,0,0.2); }

    #setupControls { display: none; margin-top: 20px; background: #FFF; padding: 30px 40px; border-radius: 40px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 5px dashed #FFCDD2; }
    .control-row { margin-bottom: 20px; }
    .select-style { font-family: 'Jua', sans-serif; font-size: 26px; padding: 10px 15px; border-radius: 15px; margin-left: 15px; width: 340px; border: 3px solid #E0E0E0; background: #FAFAFA; color: #555; cursor: pointer; }
    .select-style:focus { outline: none; border-color: #FF8A65; }
    #aiLoadingMsg { color: #00838F; font-size: 24px; display: none; text-align: center; margin-top: 15px; background: #E0F7FA; padding: 10px 20px; border-radius: 20px; }
  </style>
</head>
<body>

  <video id="cameraBackground" autoplay playsinline></video>
  
  <div id="handPointer0" class="hand-pointer"></div>
  <div id="handPointer1" class="hand-pointer"></div>
  
  <div id="divider2P">
    <div id="vsBadge">VS</div>
  </div>
  
  <div id="timerBoard">⏰ <span id="timer">60</span>초</div>
  
  <div id="scoreBoard1P">⭐️ <span id="score1P">0</span>점</div>
  <div id="uiContainer1P"><div id="targetMeaning1P" class="jelly-box">뜻</div></div>

  <div id="uiP1">
    <span class="score">💎 <span id="scoreP1">0</span></span>
    <span class="target" id="targetP1">뜻</span>
  </div>

  <div id="uiP2">
    <span class="score">🔥 <span id="scoreP2">0</span></span>
    <span class="target" id="targetP2">뜻</span>
  </div>

  <div id="overlay">
    <h1 style="font-size: 80px; margin-bottom: 5px; color: #FF4081; text-shadow: 4px 4px 0px #FFF, 6px 6px 0px #F48FB1;">🎈 단어 팡팡 젤리 게임 🎈</h1>
    <p style="font-size: 32px; color: #795548;" id="statusText">단어장(엑셀 파일)을 선택해주세요!</p>
    
    <div class="file-upload-wrapper" id="uploadWrapper">
      <button class="btn">📁 엑셀 파일 고르기</button>
      <input type="file" id="excelFile" accept=".xlsx, .xls" />
    </div>

    <div id="setupControls">
      <div class="control-row">
        <label style="font-size: 30px; color: #607D8B;">📷 화면 방향</label>
        <select id="mirrorSelect" class="select-style" onchange="toggleMirror()">
          <option value="mirror" selected>✨ 내 앞의 화면 (거울 모드)</option>
          <option value="normal">반대편 화면 (교차 모드)</option>
        </select>
      </div>

      <div class="control-row">
        <label style="font-size: 30px; color: #607D8B;">🕹️ 게임 모드</label>
        <select id="gameModeSelect" class="select-style" onchange="toggleSetupUI()">
          <option value="1">👤 1인 / 다함께 모드</option>
          <option value="2">⚔️ 2인 반반 대결 모드</option>
        </select>
      </div>
      
      <div class="control-row" id="targetScoreDiv">
        <label style="font-size: 30px; color: #607D8B;">🎯 목표 점수</label>
        <select id="targetScoreSelect" class="select-style">
          <option value="100" selected>100점 (보통)</option>
          <option value="150">150점 (어려움)</option>
          <option value="infinite">무제한 타임어택</option>
        </select>
      </div>

      <div class="control-row">
        <label style="font-size: 30px; color: #607D8B;">👆 조작 방법</label>
        <select id="inputTypeSelect" class="select-style" onchange="initAiIfSelected()">
          <option value="touch" selected>터치 및 마우스</option>
          <option value="motion">✨ 허공 터치 (모션 인식)</option>
        </select>
      </div>
    </div>

    <div id="aiLoadingMsg">🤖 AI가 똑똑해지는 중이에요... (약 3초)</div>
    <button id="startBtn" class="btn" onclick="startGame()">🚀 출발하기!</button>
  </div>

  <script>
    let wordsData = [];
    let currentMode = '1';
    let inputMode = 'touch';
    let isMirrored = true; 
    
    let target1P = null; let score1P = 0;
    let targetP1 = null; let scoreP1 = 0;
    let targetP2 = null; let scoreP2 = 0;
    
    let timeLeft = 60; let targetScore = 100;
    let gameInterval; let spawnInterval; let timerInterval;
    let activeWords = []; let isGameOver = false;

    let handsModel = null;
    let isAiLoaded = false;
    let lastVideoTime = -1;
    let isAiProcessing = false; 
    const videoElement = document.getElementById('cameraBackground');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      if (type === 'correct') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      } else if (type === 'victory') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); 
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); osc.start(); osc.stop(audioCtx.currentTime + 0.8);
      }
    }

    async function initCamera() {
      try { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); videoElement.srcObject = stream; } 
      catch (err) { alert('카메라 권한을 허용해 주세요!'); }
    }

    function toggleMirror() {
      isMirrored = document.getElementById('mirrorSelect').value === 'mirror';
      videoElement.style.transform = isMirrored ? 'scaleX(-1)' : 'none';
    }

    function initAiIfSelected() {
      inputMode = document.getElementById('inputTypeSelect').value;
      if (inputMode === 'motion' && !isAiLoaded) {
        document.getElementById('aiLoadingMsg').style.display = 'block';
        document.getElementById('startBtn').style.opacity = '0.5';
        document.getElementById('startBtn').disabled = true;

        handsModel = new Hands({locateFile: (file) => { return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`; }});
        handsModel.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        handsModel.onResults(onAiResults);
        
        handsModel.initialize().then(() => {
          isAiLoaded = true;
          document.getElementById('aiLoadingMsg').innerText = '✨ 눈 깜짝할 새 준비 완료!';
          setTimeout(() => document.getElementById('aiLoadingMsg').style.display = 'none', 1500);
          document.getElementById('startBtn').style.opacity = '1'; document.getElementById('startBtn').disabled = false;
        });
      }
    }

    function onAiResults(results) {
      document.getElementById('handPointer0').style.display = 'none'; document.getElementById('handPointer1').style.display = 'none';
      if (results.multiHandLandmarks && inputMode === 'motion' && !isGameOver) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          if(i > 1) break;
          const indexTip = results.multiHandLandmarks[i][8];
          const px = isMirrored ? (1 - indexTip.x) * window.innerWidth : indexTip.x * window.innerWidth;
          const py = indexTip.y * window.innerHeight;

          const pointerEl = document.getElementById('handPointer' + i);
          pointerEl.style.display = 'block'; pointerEl.style.left = px + 'px'; pointerEl.style.top = py + 'px';
          checkMotionCollision(px, py);
        }
      }
    }

    function checkMotionCollision(px, py) {
      for (let i = 0; i < activeWords.length; i++) {
        let w = activeWords[i];
        if (w.speed === 0) continue; 
        if (currentMode === '2') {
          const halfWidth = window.innerWidth / 2;
          if (w.player === 1 && px > halfWidth) continue; 
          if (w.player === 2 && px < halfWidth) continue; 
        }
        let rect = w.element.getBoundingClientRect();
        let padding = 40; 

        if (px > rect.left - padding && px < rect.right + padding && py > rect.top - padding && py < rect.bottom + padding) {
          checkWord(w.element, w.wordObj, w.player);
        }
      }
    }

    function updatePositions() {
      if(isGameOver) return;
      if(inputMode === 'motion' && isAiLoaded && videoElement.readyState >= 2) {
        if (videoElement.currentTime !== lastVideoTime && !isAiProcessing) {
          isAiProcessing = true; lastVideoTime = videoElement.currentTime;
          handsModel.send({image: videoElement}).then(() => { isAiProcessing = false; });
        }
      }

      for (let i = activeWords.length - 1; i >= 0; i--) {
        let w = activeWords[i];
        w.y += w.speed; w.element.style.top = w.y + 'px';
        if (w.y > window.innerHeight) { w.element.remove(); activeWords.splice(i, 1); }
      }
      gameInterval = requestAnimationFrame(updatePositions);
    }

    document.getElementById('excelFile').addEventListener('change', function(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'});
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        wordsData = json.filter(row => row['단어'] && row['뜻']).map(row => ({ word: row['단어'].toString(), meaning: row['뜻'].toString() }));
        
        if(wordsData.length < 2) return alert('단어를 더 채워주세요!');
        document.getElementById('statusText').innerHTML = `🎁 총 <b>${wordsData.length}</b>개의 젤리가 준비되었어요!`;
        document.getElementById('uploadWrapper').style.display = 'none'; 
        document.getElementById('setupControls').style.display = 'block'; document.getElementById('startBtn').style.display = 'block';
      };
      reader.readAsArrayBuffer(file);
    });

    window.onload = () => { initCamera(); toggleMirror(); };

    function toggleSetupUI() {
      currentMode = document.getElementById('gameModeSelect').value;
      document.getElementById('targetScoreDiv').style.display = currentMode === '1' ? 'block' : 'none';
    }

    function startGame() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      clearInterval(spawnInterval); clearInterval(timerInterval); cancelAnimationFrame(gameInterval);
      
      currentMode = document.getElementById('gameModeSelect').value;
      inputMode = document.getElementById('inputTypeSelect').value;
      timeLeft = 60; isGameOver = false;
      
      activeWords.forEach(w => w.element.remove()); activeWords = [];
      document.getElementById('handPointer0').style.display = 'none'; document.getElementById('handPointer1').style.display = 'none';

      document.getElementById('uiContainer1P').style.display = 'none'; document.getElementById('scoreBoard1P').style.display = 'none';
      document.getElementById('uiP1').style.display = 'none'; document.getElementById('uiP2').style.display = 'none'; document.getElementById('divider2P').style.display = 'none';
      
      document.getElementById('timer').innerText = timeLeft; document.getElementById('timerBoard').style.display = 'block';

      if(currentMode === '1') {
        score1P = 0; document.getElementById('score1P').innerText = score1P;
        targetScore = document.getElementById('targetScoreSelect').value === 'infinite' ? Infinity : parseInt(document.getElementById('targetScoreSelect').value);
        document.getElementById('uiContainer1P').style.display = 'block'; document.getElementById('scoreBoard1P').style.display = 'block';
        setNewTarget(0); 
      } else {
        scoreP1 = 0; scoreP2 = 0;
        document.getElementById('scoreP1').innerText = scoreP1; document.getElementById('scoreP2').innerText = scoreP2;
        document.getElementById('uiP1').style.display = 'flex'; document.getElementById('uiP2').style.display = 'flex'; document.getElementById('divider2P').style.display = 'block';
        setNewTarget(1); setNewTarget(2);
      }

      document.getElementById('overlay').style.display = 'none';
      gameInterval = requestAnimationFrame(updatePositions);
      spawnInterval = setInterval(spawnWord, currentMode === '1' ? 1200 : 1500);
      timerInterval = setInterval(updateTimer, 1000); 
    }

    function updateTimer() {
      if(isGameOver || document.hidden) return; 
      timeLeft--; document.getElementById('timer').innerText = timeLeft;
      if (timeLeft <= 0) endGame('timeout'); 
    }

    function setNewTarget(player) {
      if(isGameOver) return;
      const randomWord = wordsData[Math.floor(Math.random() * wordsData.length)];
      if(player === 0) { target1P = randomWord; document.getElementById('targetMeaning1P').innerText = target1P.meaning; }
      else if(player === 1) { targetP1 = randomWord; document.getElementById('targetP1').innerText = targetP1.meaning; }
      else if(player === 2) { targetP2 = randomWord; document.getElementById('targetP2').innerText = targetP2.meaning; }
    }

    function spawnWord() {
      if(isGameOver || document.hidden) return; 
      const maxWords = currentMode === '1' ? 8 : 14; 
      if(activeWords.length >= maxWords) return;

      if(currentMode === '1') {
        createWordElement(0, target1P, Math.random() * (window.innerWidth - 300));
      } else {
        const halfWidth = window.innerWidth / 2;
        createWordElement(1, targetP1, Math.random() * (halfWidth - 300));
        createWordElement(2, targetP2, halfWidth + 50 + Math.random() * (halfWidth - 300));
      }
    }

    function createWordElement(player, currentTargetObj, startLeft) {
      const isTarget = Math.random() > 0.5; 
      const wordObj = isTarget ? currentTargetObj : wordsData[Math.floor(Math.random() * wordsData.length)];
      
      const wordEl = document.createElement('div');
      wordEl.className = 'falling-word';
      if(player === 0) wordEl.classList.add('word-1p');
      else if(player === 1) wordEl.classList.add('word-p1');
      else if(player === 2) wordEl.classList.add('word-p2');

      wordEl.innerText = wordObj.word;
      wordEl.style.left = startLeft + 'px';
      wordEl.style.top = '-120px'; 
      
      const handleTouch = (e) => { e.preventDefault(); checkWord(wordEl, wordObj, player); };
      wordEl.addEventListener('mousedown', () => checkWord(wordEl, wordObj, player));
      wordEl.addEventListener('touchstart', handleTouch);

      document.body.appendChild(wordEl);
      activeWords.push({ element: wordEl, wordObj: wordObj, y: -120, speed: 2.5 + Math.random() * 3, player: player });
    }

    function checkWord(element, wordObj, player) {
      if(isGameOver) return;
      const wordData = activeWords.find(w => w.element === element);
      if (!wordData || wordData.speed === 0) return;
      wordData.speed = 0; 

      let isCorrect = false;
      if(player === 0) isCorrect = (wordObj.word === target1P.word);
      else if(player === 1) isCorrect = (wordObj.word === targetP1.word);
      else if(player === 2) isCorrect = (wordObj.word === targetP2.word);

      if (isCorrect) {
        playSound('correct'); element.classList.add('correct-anim');
        if(player === 0) { score1P += 10; document.getElementById('score1P').innerText = score1P; setNewTarget(0); if(score1P >= targetScore) setTimeout(() => endGame('targetReached'), 400); }
        else if(player === 1) { scoreP1 += 10; document.getElementById('scoreP1').innerText = scoreP1; setNewTarget(1); }
        else if(player === 2) { scoreP2 += 10; document.getElementById('scoreP2').innerText = scoreP2; setNewTarget(2); }
      } else {
        playSound('wrong'); element.classList.add('wrong-anim');
        if(player === 0) { score1P = Math.max(0, score1P - 5); document.getElementById('score1P').innerText = score1P; }
        else if(player === 1) { scoreP1 = Math.max(0, scoreP1 - 5); document.getElementById('scoreP1').innerText = scoreP1; }
        else if(player === 2) { scoreP2 = Math.max(0, scoreP2 - 5); document.getElementById('scoreP2').innerText = scoreP2; }
      }
      setTimeout(() => { element.remove(); activeWords = activeWords.filter(w => w.element !== element); }, 400);
    }

    function endGame(reason) {
      isGameOver = true;
      clearInterval(spawnInterval); clearInterval(timerInterval); cancelAnimationFrame(gameInterval);
      document.getElementById('handPointer0').style.display = 'none'; document.getElementById('handPointer1').style.display = 'none';

      const statusText = document.getElementById('statusText');
      document.getElementById('startBtn').innerText = '🔄 한 번 더 하기!';

      if(currentMode === '1') {
        if (reason === 'targetReached') {
          playSound('victory'); statusText.innerHTML = `🎉 <span style="color:#FF4081; font-size:55px;">미션 성공! 최고야!</span> 🎉<br><br><span style="font-size:35px; color:#FF9800;">⏰ 남은 시간: ${timeLeft}초</span>`;
        } else {
          playSound('wrong'); statusText.innerHTML = `⏱️ <span style="color:#F44336; font-size:55px;">아쉬워요, 타임아웃!</span> ⏱️<br><br><span style="font-size:35px; color:#FF9800;">⭐️ 최종 점수: ${score1P}점</span>`;
        }
      } else {
        playSound('victory');
        let resultHtml = `⏱️ <span style="color:#009688; font-size:55px;">경기 끝! 두구두구~</span> ⏱️<br><br><span style="color:#0288D1; font-size:40px;">💎 P1: ${scoreP1}점</span> <span style="font-size:40px; color:#9E9E9E;">vs</span> <span style="color:#E65100; font-size:40px;">🔥 P2: ${scoreP2}점</span><br><br>`;
        if(scoreP1 > scoreP2) resultHtml += `<span style="font-size:60px; color:#0288D1;">🏆 왼쪽(P1) 승리! 🏆</span>`;
        else if(scoreP2 > scoreP1) resultHtml += `<span style="font-size:60px; color:#E65100;">🏆 오른쪽(P2) 승리! 🏆</span>`;
        else resultHtml += `<span style="font-size:60px; color:#4CAF50;">🤝 사이좋게 무승부! 🤝</span>`;
        statusText.innerHTML = resultHtml;
      }
      document.getElementById('overlay').style.display = 'flex';
    }
  </script>
